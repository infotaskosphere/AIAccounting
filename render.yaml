## render.yaml
## ⚠️  THIS FILE MUST BE AT THE ROOT OF YOUR REPO (same level as frontend/ and backend/ folders)
## NOT inside frontend/ — Render only reads render.yaml from the repo root.

services:

  # ── Frontend (React SPA) ──────────────────────────────────────────────────
  - type: web
    name: aiaccounting-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      # All /api/* requests → backend service
      - type: rewrite
        source: /api/*
        destination: https://aiaccounting-api.onrender.com/api/*
      # Serve built JS/CSS/image assets directly (do NOT rewrite to index.html)
      # Without this, Vite-hashed filenames like /assets/index-Cw1_Jr6V.js get 404
      - type: rewrite
        source: /assets/*
        destination: /assets/:splat
      # SPA fallback: every other URL serves index.html (enables React Router)
      # Without this, hard refresh on /bank or /reports gives "Not Found"
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Backend (FastAPI) ─────────────────────────────────────────────────────
  - type: web
    name: aiaccounting-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: aiaccounting-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
    healthCheckPath: /health

databases:
  - name: aiaccounting-db
    databaseName: accounting
    user: accounting
