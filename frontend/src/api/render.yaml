## render.yaml — PUT THIS FILE AT THE ROOT OF YOUR REPO (not inside frontend/)
## This fixes: /reports "Not Found", /bank "Not Found", all page refreshes breaking

services:

  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: aiaccounting-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: aiaccounting-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        fromService:
          name: aiaccounting-frontend
          type: web
          property: host
    healthCheckPath: /health

  # ── Frontend (React/Vite static site) ─────────────────────────────────────
  - type: web
    name: aiaccounting-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      # Proxy all /api/* requests to the backend service
      - type: rewrite
        source: /api/*
        destination: https://aiaccounting-api.onrender.com/api/*
      # SPA fallback — serve index.html for ALL routes (fixes /reports, /bank etc.)
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: aiaccounting-db
    databaseName: accounting
    user: accounting
